<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片拼接工具</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            align-items: center;
        }

        .layout-selector {
            display: flex;
            gap: 10px;
        }

        .layout-btn {
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .layout-btn.active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }

        .text-input {
            flex: 1;
            min-width: 300px;
        }

        .text-input textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            resize: vertical;
            min-height: 150px;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #007bff;
            background-color: #f8f9fa;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-area label {
            display: block;
            cursor: pointer;
        }

        .upload-area i {
            font-size: 32px;
            color: #ddd;
            margin-bottom: 8px;
        }

        .upload-area:hover i {
            color: #007bff;
        }

        .upload-area p {
            color: #666;
            font-size: 14px;
        }

        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            min-height: 100px;
        }

        .preview-item {
            position: relative;
            border: 1px solid #ddd;
            border-radius: 5px;
            overflow: hidden;
            width: calc(25% - 10px);
            aspect-ratio: 1;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: rgba(255, 255, 255, 0.8);
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #333;
        }

        .remove-btn:hover {
            background-color: #ff4d4f;
            color: white;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background-color: #0069d9;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
        }

        .result-container {
            margin-top: 30px;
            text-align: center;
        }

        .result-image {
            max-width: 100%;
            border: none;
            margin-bottom: 20px;
        }

        /* 预览区域样式 */
        .preview-container {
            position: absolute;
            left: -9999px;
            top: -9999px;
            visibility: hidden;
        }

        .preview-wrapper {
            background: white;
            overflow: hidden;
            max-width: 800px;
            /* 生成大图四周保留 30px 空白 */
            padding: 30px;
        }

        .image-grid {
            display: grid;
            gap: 10px;
        }

        /* 4张图片布局 */
        .image-grid.four-images {
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, auto);
        }

        /* 6张图片布局 */
        .image-grid.six-images {
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, auto);
        }

        /* 8张图片布局 */
        .image-grid.eight-images {
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(4, auto);
        }

        /* 默认布局（2张图片） */
        .image-grid.two-images {
            display: block;
        }

        .grid-item {
            overflow: hidden;
        }

        .two-images .grid-item {
            margin-bottom: 10px;
        }

        .two-images .grid-item:last-child {
            margin-bottom: 0;
        }

        .grid-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .text-area {
            /* 只保留与图片之间的垂直间距，左右去掉额外缩进 */
            padding: 15px 0 0 0;
            text-align: left;
            line-height: 1.5;
            font-size: 36px;
        }
        
        .text-area p {
            /* 首行缩进两个汉字字符 */
            text-indent: 2em;
            margin: 0;
        }

        @media (max-width: 1200px) {
            .image-grid.layout-4,
            .image-grid.layout-6,
            .image-grid.layout-8 {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .text-input {
                min-width: unset;
            }

            .image-preview.small,
            .image-preview.medium,
            .image-preview.large {
                grid-template-columns: repeat(2, 1fr);
            }

            .image-grid.layout-2,
            .image-grid.layout-4,
            .image-grid.layout-6,
            .image-grid.layout-8 {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(auto, 200px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>工作简报生成器</h1>
        
        <div class="controls">
            <div class="text-input">
                <textarea placeholder="请输入图片下方的文字..."></textarea>
            </div>
        </div>
        
        <div class="upload-area">
            <input type="file" id="file-input" multiple accept="image/*">
            <label for="file-input">
                <i>📷</i>
                <p>点击或拖拽上传图片（最多8张）</p>
            </label>
        </div>
        
        <div class="image-preview small" id="image-preview"></div>
        
        <!-- 预览容器 -->
        <div class="preview-container" id="preview-container">
            <div class="preview-wrapper" id="preview-wrapper">
                <div class="image-grid" id="image-grid"></div>
                <div class="text-area" id="text-area"></div>
            </div>
        </div>
        

        
        <div class="result-container" id="result-container">
            <!-- 生成的拼接图片将显示在这里 -->
        </div>
    </div>

    <script>
        // 全局变量
        let uploadedImages = [];
        let generatedCanvas = null;
        let isUploading = false; // 上传状态标志
        
        // 支持的图片数量
        const supportedCounts = [2, 4, 6, 8];
        
        // DOM元素
        const fileInput = document.getElementById('file-input');
        const imagePreview = document.getElementById('image-preview');
        const clearBtn = document.getElementById('clear-btn');
        const resultContainer = document.getElementById('result-container');
        const previewContainer = document.getElementById('preview-container');
        const previewWrapper = document.getElementById('preview-wrapper');
        const imageGrid = document.getElementById('image-grid');
        const textArea = document.getElementById('text-area');
        
        // 初始化
        function init() {
            updatePreviewGrid();
            updateLayoutPreview();
        }
        
        // 文件输入变化事件
        fileInput.addEventListener('change', function(e) {
            // 防止重复上传
            if (isUploading) return;
            
            const files = Array.from(e.target.files);
            
            // 限制文件数量
            if (uploadedImages.length + files.length > 8) {
                alert('最多只能上传8张图片！');
                return;
            }
            
            // 设置上传状态
            isUploading = true;
            
            // 处理每个文件
            let processedCount = 0;
            files.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        uploadedImages.push({
                            file: file,
                            url: e.target.result
                        });
                        processedCount++;
                        
                        // 所有文件处理完成
                        if (processedCount === files.length) {
                            isUploading = false;
                            updatePreviewGrid();
                            updateLayoutPreview();
                        }
                    };
                    reader.onerror = function() {
                        processedCount++;
                        if (processedCount === files.length) {
                            isUploading = false;
                            updatePreviewGrid();
                            updateLayoutPreview();
                        }
                    };
                    reader.readAsDataURL(file);
                } else {
                    processedCount++;
                    if (processedCount === files.length) {
                        isUploading = false;
                        updatePreviewGrid();
                        updateLayoutPreview();
                    }
                }
            });
        });
        
        // 文字输入变化事件
        document.querySelector('textarea').addEventListener('input', function() {
            updateLayoutPreview();
        });
        
        // 更新预览网格
        function updatePreviewGrid() {
            // 清空预览
            imagePreview.innerHTML = '';
            
            // 根据图片数量设置网格
            if (uploadedImages.length <= 4) {
                imagePreview.className = 'image-preview small';
            } else if (uploadedImages.length <= 6) {
                imagePreview.className = 'image-preview medium';
            } else {
                imagePreview.className = 'image-preview large';
            }
            
            // 添加预览项
            uploadedImages.forEach((image, index) => {
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';
                previewItem.innerHTML = `
                    <img src="${image.url}" alt="预览图片">
                    <button class="remove-btn" data-index="${index}">×</button>
                `;
                imagePreview.appendChild(previewItem);
            });
            
            // 添加删除按钮事件
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.dataset.index);
                    uploadedImages.splice(index, 1);
                    updatePreviewGrid();
                    updateLayoutPreview();
                });
            });
        }
        
        // 更新布局预览
        function updateLayoutPreview() {
            // 检查是否有图片
            if (uploadedImages.length === 0) {
                resultContainer.innerHTML = '';
                return;
            }
            
            // 验证图片数量
            if (!supportedCounts.includes(uploadedImages.length)) {
                resultContainer.innerHTML = '<p style="color: red; text-align: center;">请上传2张、4张、6张或8张图片！</p>';
                return;
            }
            
            // 清空网格
            imageGrid.innerHTML = '';
            
            // 根据图片数量设置布局
            let gridClass = 'image-grid';
            if (uploadedImages.length === 2) {
                gridClass += ' two-images';
            } else if (uploadedImages.length === 4) {
                gridClass += ' four-images';
            } else if (uploadedImages.length === 6) {
                gridClass += ' six-images';
            } else if (uploadedImages.length === 8) {
                gridClass += ' eight-images';
            }
            imageGrid.className = gridClass;
            
            // 添加图片
            uploadedImages.forEach((image, index) => {
                const gridItem = document.createElement('div');
                gridItem.className = 'grid-item';
                
                // 创建图片元素
                const img = document.createElement('img');
                img.src = image.url;
                img.alt = `图片${index + 1}`;
                img.style.width = '100%';
                img.style.height = 'auto';
                img.style.display = 'block';
                
                gridItem.appendChild(img);
                imageGrid.appendChild(gridItem);
            });
            
            // 添加文字
            const text = document.querySelector('textarea').value;
            if (text) {
                // 直接显示文字，保持原始格式
                textArea.innerHTML = `<p>${text}</p>`;
            } else {
                textArea.innerHTML = '';
            }
            
            // 自动生成预览
            generatePreview();
        }
        
        // 生成预览
        function generatePreview() {
            if (uploadedImages.length === 0) return;
            
            // 确保预览容器可见以便html2canvas捕获
            const originalStyle = previewContainer.style.visibility;
            previewContainer.style.visibility = 'visible';
            
            // 使用html2canvas生成图片
            html2canvas(previewWrapper, {
                scale: 2, // 提高清晰度
                useCORS: true, // 支持跨域图片
                backgroundColor: '#ffffff',
                logging: false,
                removeContainer: false
            }).then(function(canvas) {
                generatedCanvas = canvas;
                updateResultDisplay();
                // 恢复预览容器状态
                previewContainer.style.visibility = originalStyle;
            }).catch(function(error) {
                console.error('生成图片失败:', error);
                // 恢复预览容器状态
                previewContainer.style.visibility = originalStyle;
            });
        }
        
        // 更新结果显示
        function updateResultDisplay() {
            if (!generatedCanvas) return;
            
            // 清空结果容器
            resultContainer.innerHTML = '';
            
            // 创建图片元素
            const resultImage = document.createElement('img');
            resultImage.className = 'result-image';
            resultImage.src = generatedCanvas.toDataURL('image/png');
            resultContainer.appendChild(resultImage);
            
            // 创建按钮容器
            const btnContainer = document.createElement('div');
            btnContainer.style.display = 'flex';
            btnContainer.style.gap = '10px';
            btnContainer.style.justifyContent = 'center';
            btnContainer.style.marginTop = '10px';
            
            // 创建下载按钮
            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'btn btn-primary';
            downloadBtn.textContent = '下载/长按图片保存';
            downloadBtn.addEventListener('click', function() {
                if (!generatedCanvas) return;

                const dataUrl = generatedCanvas.toDataURL('image/png');
                // 简单判断是否为 iOS（含带触摸的 M 芯片 Mac）
                const ua = navigator.userAgent || navigator.vendor || window.opera;
                const isIOS = /iPad|iPhone|iPod/.test(ua) ||
                    (ua.includes('Macintosh') && 'ontouchend' in document);

                if (isIOS) {
                    // iOS Safari 不支持 a[download] + dataURL，直接新开窗口展示，用户长按保存
                    const win = window.open();
                    if (win) {
                        win.document.write('<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1.0"></head><body style="margin:0;"><img src="' +
                            dataUrl +
                            '" style="width:100%;height:auto;display:block;"/></body></html>');
                        win.document.close();
                    } else {
                        // 后备：直接跳转
                        window.location.href = dataUrl;
                    }
                } else {
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = '拼接图片_' + new Date().getTime() + '.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            });
            btnContainer.appendChild(downloadBtn);
            
            // 创建清空按钮
            const clearBtn = document.createElement('button');
            clearBtn.className = 'btn btn-secondary';
            clearBtn.textContent = '清空';
            clearBtn.addEventListener('click', function() {
                uploadedImages = [];
                generatedCanvas = null;
                isUploading = false; // 重置上传状态
                document.querySelector('textarea').value = '';
                resultContainer.innerHTML = '';
                updatePreviewGrid();
            });
            btnContainer.appendChild(clearBtn);
            
            resultContainer.appendChild(btnContainer);
        }
        

        
        // 初始化
        init();
    </script>
</body>
</html>
